name: Dependabot Changeset

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          CHANGESET_ID="dependabot-$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 50)"

          # Find the package that was actually changed
          CHANGED_PKG_DIR=$(git diff HEAD~1 --name-only | grep 'package.json' | grep -v '^package.json$' | head -1 | xargs dirname 2>/dev/null || true)

          HEADER="---"

          if [ -n "$CHANGED_PKG_DIR" ] && [ -f "$CHANGED_PKG_DIR/package.json" ]; then
            PKG_NAME=$(node -e "console.log(require('./$CHANGED_PKG_DIR/package.json').name)" 2>/dev/null || echo "")
            if [ -n "$PKG_NAME" ]; then
              HEADER="$HEADER
\"$PKG_NAME\": patch"
            fi
          fi

          # Fallback: if no specific package found, use root
          if [ "$HEADER" = "---" ]; then
            PKG_NAME=$(node -e "console.log(require('./package.json').name)" 2>/dev/null || echo "unknown")
            HEADER="$HEADER
\"$PKG_NAME\": patch"
          fi

          HEADER="$HEADER
---"

          mkdir -p .changeset
          printf '%s\n\n%s\n' "$HEADER" "$PR_TITLE" > ".changeset/${CHANGESET_ID}.md"

          echo "Created changeset: .changeset/${CHANGESET_ID}.md"
          cat ".changeset/${CHANGESET_ID}.md"

      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: add changeset for dependabot update"
          git push
