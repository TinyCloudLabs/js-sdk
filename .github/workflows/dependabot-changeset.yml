name: Dependabot Changeset

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  changeset:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          CHANGESET_ID="dependabot-$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 50)"

          CHANGED_PKG_DIR=$(git diff HEAD~1 --name-only | grep 'package.json' | grep -v '^package.json$' | head -1 | xargs dirname 2>/dev/null || true)

          PKG_NAME=""
          if [ -n "$CHANGED_PKG_DIR" ] && [ -f "$CHANGED_PKG_DIR/package.json" ]; then
            PKG_NAME=$(node -e "console.log(require('./$CHANGED_PKG_DIR/package.json').name)" 2>/dev/null || echo "")
          fi
          if [ -z "$PKG_NAME" ]; then
            PKG_NAME=$(node -e "console.log(require('./package.json').name)" 2>/dev/null || echo "unknown")
          fi

          mkdir -p .changeset
          cat > ".changeset/${CHANGESET_ID}.md" << CHANGESET_EOF
          ---
          "${PKG_NAME}": patch
          ---

          ${PR_TITLE}
          CHANGESET_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' ".changeset/${CHANGESET_ID}.md"

          echo "Created changeset:"
          cat ".changeset/${CHANGESET_ID}.md"

      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: add changeset for dependabot update"
          git push
