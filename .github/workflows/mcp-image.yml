name: Publish hosted MCP image

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Published @tinycloud/mcp version
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/mcp
          push: true
          build-args: TINYCLOUD_MCP_VERSION=${{ inputs.package_version }}
          tags: |
            ghcr.io/tinycloudlabs/tinycloud-mcp:${{ inputs.package_version }}
            ghcr.io/tinycloudlabs/tinycloud-mcp:latest
