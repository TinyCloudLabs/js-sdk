name: Release

on:
  push:
    branches:
      - master
  release:
    types: [published]

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # On push to master: publish beta pre-releases for packages with pending changesets
  beta:
    name: Beta Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Enter pre-release mode
        if: steps.check.outputs.pending != '0'
        run: bun changeset pre enter beta

      - name: Version packages
        if: steps.check.outputs.pending != '0'
        run: bun changeset version

      - name: Build packages
        if: steps.check.outputs.pending != '0'
        run: bun run build
        env:
          BUILD_SETUP_ENABLED: true

      - name: Setup npm auth
        if: steps.check.outputs.pending != '0'
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish beta to npm
        if: steps.check.outputs.pending != '0'
        run: bun changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Exit pre-release mode
        if: steps.check.outputs.pending != '0'
        run: bun changeset pre exit

  # On GitHub Release published: version properly and publish stable
  stable:
    name: Stable Release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Version packages
        run: bun changeset version

      - name: Build packages
        run: bun run build
        env:
          BUILD_SETUP_ENABLED: true

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: bun changeset publish --tag latest
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version packages [skip ci]" || echo "No changes to commit"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
