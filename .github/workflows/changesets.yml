name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"

      # --- Beta: publish pre-releases for every push with pending changesets ---
      - name: Beta pre-release
        if: steps.check.outputs.pending != '0'
        run: |
          bun changeset pre enter beta
          bun changeset version
          bun run build
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun changeset publish
          bun changeset pre exit
          git checkout -- .
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUILD_SETUP_ENABLED: true

      # --- Stable: changesets/action handles two cases automatically:
      #     1. Pending changesets → creates/updates "Version Packages" PR
      #     2. No pending changesets (PR was just merged) → runs publish command
      - name: Setup npm auth
        run: |
          ./scripts/npm-auth.sh
          bun run npm-pub
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: bun changeset version
          publish: bun run build && bun changeset publish --access public
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUILD_SETUP_ENABLED: true
