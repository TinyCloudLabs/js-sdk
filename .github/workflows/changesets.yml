name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm stable release'
        required: true

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # On push to master: publish incrementing beta pre-releases
  beta:
    name: Beta Release
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"

      - name: List pending changesets
        if: steps.check.outputs.pending != '0'
        run: |
          echo "## Pending changesets to consume:"
          find .changeset -name '*.md' ! -name 'README.md' -exec basename {} \; | sort
          echo ""
          echo "## Current pre.json state:"
          cat .changeset/pre.json

      - name: Version and build
        if: steps.check.outputs.pending != '0'
        run: |
          bun changeset version
          bun install
          bun run build:release
        env:
          BUILD_SETUP_ENABLED: true

      - name: Setup Node for npm publish
        if: steps.check.outputs.pending != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish beta to npm
        if: steps.check.outputs.pending != '0'
        run: |
          # Resolve workspace:* to real versions before publishing.
          # Belt-and-suspenders: changeset publish also resolves internally,
          # but keeping this script ensures consistency with the prior workflow.
          node -e '
            const fs = require("fs");
            const glob = require("child_process").execSync("find packages -name package.json -not -path */node_modules/*", {encoding:"utf8"}).trim().split("\n");
            const versions = {};
            for (const f of glob) {
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              if (pkg.name) versions[pkg.name] = pkg.version;
            }
            for (const f of glob) {
              const raw = fs.readFileSync(f, "utf8");
              const pkg = JSON.parse(raw);
              let changed = false;
              for (const depType of ["dependencies","devDependencies","peerDependencies"]) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (typeof ver === "string" && ver.startsWith("workspace:")) {
                    if (versions[name]) { pkg[depType][name] = versions[name]; changed = true; }
                  }
                }
              }
              if (changed) { fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n"); console.log("Resolved workspace refs in", f); }
            }
          '
          # Use `changeset publish` instead of a hand-rolled loop so that
          # already-published versions are skipped gracefully. The hand-rolled
          # loop 403'd on sdk-core@2.1.0-beta.0 in the 2026-04-10 release after
          # PR #182, aborting before the wasm packages (which actually needed
          # publishing) were attempted.
          bunx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit beta version bumps
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "chore: beta version packages [skip ci]"
            git push origin master
          }

  # Manual trigger: graduate betas to stable release
  stable:
    name: Stable Release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Exit pre mode and version
        run: |
          bun changeset pre exit
          bun changeset version

      - name: Normalize unversioned private workspaces
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          const files = execFileSync('find', [
            'apps', 'packages', 'tests', '-name', 'package.json',
            '-not', '-path', '*/node_modules/*'
          ], { encoding: 'utf8' }).trim().split('\n').filter(Boolean);

          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!pkg.private || pkg.version !== null) continue;

            delete pkg.version;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');

            const changelog = path.join(path.dirname(file), 'CHANGELOG.md');
            if (fs.existsSync(changelog)) {
              const expected = `# ${pkg.name}\n\n## null`;
              const actual = fs.readFileSync(changelog, 'utf8').trim();
              if (actual !== expected) {
                throw new Error(`Refusing to remove non-generated changelog: ${changelog}`);
              }
              fs.unlinkSync(changelog);
            }

            console.log(`Restored unversioned private workspace: ${pkg.name}`);
          }
          NODE

      - run: bun install

      - name: Build
        run: bun run build:release
        env:
          BUILD_SETUP_ENABLED: true

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish stable to npm
        run: |
          # Resolve workspace:* to real versions before publishing.
          # Belt-and-suspenders: changeset publish also resolves internally,
          # but keeping this script ensures consistency with the prior workflow.
          node -e '
            const fs = require("fs");
            const glob = require("child_process").execSync("find packages -name package.json -not -path */node_modules/*", {encoding:"utf8"}).trim().split("\n");
            const versions = {};
            for (const f of glob) {
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              if (pkg.name) versions[pkg.name] = pkg.version;
            }
            for (const f of glob) {
              const raw = fs.readFileSync(f, "utf8");
              const pkg = JSON.parse(raw);
              let changed = false;
              for (const depType of ["dependencies","devDependencies","peerDependencies"]) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (typeof ver === "string" && ver.startsWith("workspace:")) {
                    if (versions[name]) { pkg[depType][name] = versions[name]; changed = true; }
                  }
                }
              }
              if (changed) { fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n"); console.log("Resolved workspace refs in", f); }
            }
          '
          # Use `changeset publish` instead of a hand-rolled loop so that
          # already-published versions are skipped gracefully, matching the
          # beta job's behavior.
          bunx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Re-enter pre mode for next beta cycle
        run: bun changeset pre enter beta

      - name: Commit, push, and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "chore: release stable packages [skip ci]"
            git push origin master
          }

      - name: Create GitHub Release
        run: |
          VERSION=$(node -e "console.log(require('./packages/web-sdk/package.json').version)")
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub release v${VERSION} already exists; package-only release is complete."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --target master
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
