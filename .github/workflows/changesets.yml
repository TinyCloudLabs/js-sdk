name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm stable release'
        required: true

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # On push to master: publish incrementing beta pre-releases
  beta:
    name: Beta Release
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "pending=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Version and build
        if: steps.check.outputs.pending != '0'
        run: |
          bun changeset version
          bun install
          bun run build
        env:
          BUILD_SETUP_ENABLED: true

      - name: Publish beta to npm
        if: steps.check.outputs.pending != '0'
        run: |
          # Resolve workspace:* to real versions before publishing
          node -e '
            const fs = require("fs");
            const glob = require("child_process").execSync("find packages -name package.json -not -path */node_modules/*", {encoding:"utf8"}).trim().split("\n");
            const versions = {};
            for (const f of glob) {
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              if (pkg.name) versions[pkg.name] = pkg.version;
            }
            for (const f of glob) {
              const raw = fs.readFileSync(f, "utf8");
              const pkg = JSON.parse(raw);
              let changed = false;
              for (const depType of ["dependencies","devDependencies","peerDependencies"]) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (typeof ver === "string" && ver.startsWith("workspace:")) {
                    if (versions[name]) { pkg[depType][name] = versions[name]; changed = true; }
                  }
                }
              }
              if (changed) { fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n"); console.log("Resolved workspace refs in", f); }
            }
          '
          for dir in packages/sdk-core packages/node-sdk packages/web-sdk packages/sdk-services packages/cli packages/sdk-rs/packages/node packages/sdk-rs/packages/web; do
            if [ -f "$dir/package.json" ] && ! grep -q '"private"' "$dir/package.json"; then
              echo "Publishing $dir..."
              (cd "$dir" && npm publish --access public --tag beta --token "${NPM_TOKEN}") || true
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit beta version bumps
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "chore: beta version packages [skip ci]"
            git push origin master
          }

  # Manual trigger: graduate betas to stable release
  stable:
    name: Stable Release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: bun install

      - name: Exit pre mode and version
        run: |
          bun changeset pre exit
          bun changeset version
          bun install

      - name: Build
        run: bun run build
        env:
          BUILD_SETUP_ENABLED: true

      - name: Publish stable to npm
        run: |
          # Resolve workspace:* to real versions before publishing
          node -e '
            const fs = require("fs");
            const glob = require("child_process").execSync("find packages -name package.json -not -path */node_modules/*", {encoding:"utf8"}).trim().split("\n");
            const versions = {};
            for (const f of glob) {
              const pkg = JSON.parse(fs.readFileSync(f, "utf8"));
              if (pkg.name) versions[pkg.name] = pkg.version;
            }
            for (const f of glob) {
              const raw = fs.readFileSync(f, "utf8");
              const pkg = JSON.parse(raw);
              let changed = false;
              for (const depType of ["dependencies","devDependencies","peerDependencies"]) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (typeof ver === "string" && ver.startsWith("workspace:")) {
                    if (versions[name]) { pkg[depType][name] = versions[name]; changed = true; }
                  }
                }
              }
              if (changed) { fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + "\n"); console.log("Resolved workspace refs in", f); }
            }
          '
          for dir in packages/sdk-core packages/node-sdk packages/web-sdk packages/sdk-services packages/cli packages/sdk-rs/packages/node packages/sdk-rs/packages/web; do
            if [ -f "$dir/package.json" ] && ! grep -q '"private"' "$dir/package.json"; then
              echo "Publishing $dir..."
              (cd "$dir" && npm publish --access public --token "${NPM_TOKEN}") || true
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Re-enter pre mode for next beta cycle
        run: bun changeset pre enter beta

      - name: Commit, push, and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "chore: release stable packages [skip ci]"
            git push origin master
          }

      - name: Create GitHub Release
        run: |
          VERSION=$(node -e "console.log(require('./packages/web-sdk/package.json').version)")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --target master
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
