[package]
name = "tinycloud-web-sdk-rs"
version = "0.1.0"
authors = ["TinyCloud, Inc."]
edition = "2021"
license = "Apache-2.0 OR MIT"
description = "Library for use in tinycloud-web-sdk."
repository = "https://github.com/tinycloudlabs/web-sdk/"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
browser = ["web-sys", "getrandom/js"]
nodejs = ["k256", "sha3", "base64"]

[dependencies]
console_error_panic_hook = "0.1"
ed25519-dalek = "2.2"
hex = "0.4.3"
iri-string = "0.7.12"
js-sys = "0.3.59"
# WASM-build pin. Tracks tinycloud-node RELEASE TAGS (never unreleased revs).
#
# v1.4.10 contains the TC-178 account delegation history registry additions and
# remains compatible with the TC-112 capability registry integration introduced
# in v1.4.5. That earlier release was the first tag that both contained the
# registry and wired it into the live /invoke//delegate chain-containment paths
# (TC-119: alias/implication-aware models/delegation.rs + models/invocation.rs).
# So unlike the v1.4.2 pin — where the registry was decoupled and the compiled
# WASM was unaffected — bumping to v1.4.5 can genuinely change the compiled WASM,
# and that is intended. tinycloud-node#98 (the registry) is merged and released.
#
# The capability registry sync stays anchored to the vendored
# packages/bootstrap/src/generated/capabilities.ts + the capabilities-sync CI
# fetch-and-diff (anchored to the release-tag rev) + the identity test. The pin
# and that anchor now point at the SAME release, but the anchor — not this pin —
# remains the authoritative registry source. Bump this pin only to newer node
# release tags, in lockstep with the re-vendor + anchor update (TC-121 covers the
# codegen source-sha headers those steps rely on).
tinycloud-sdk-rs = { git = "https://github.com/tinycloudlabs/tinycloud-node.git", tag = "v1.4.10" }
tinycloud-sdk-wasm = { git = "https://github.com/tinycloudlabs/tinycloud-node.git", tag = "v1.4.10" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.150"
serde-wasm-bindgen = "0.6.5"
time = { version = "0.3.47", features = ["parsing"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4.70"

# Random number generation (features enabled per-target)
getrandom = "0.2"

# Browser-only (optional)
web-sys = { version = "0.3.59", features = ["console"], optional = true }

# Node.js - Ethereum signing (optional)
k256 = { version = "0.13", features = ["ecdsa", "std"], optional = true }
sha3 = { version = "0.10", optional = true }
base64 = { version = "0.21", optional = true }
rsa = "0.9.10"

[dev-dependencies]
tokio = { version = "1.52", features = ["full"] }
rsa = "0.9.10"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]
