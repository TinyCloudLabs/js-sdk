[package]
name = "tinycloud-web-sdk-rs"
version = "0.1.0"
authors = ["TinyCloud, Inc."]
edition = "2021"
license = "Apache-2.0 OR MIT"
description = "Library for use in tinycloud-web-sdk."
repository = "https://github.com/tinycloudlabs/web-sdk/"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
browser = ["web-sys", "getrandom/js"]
nodejs = ["k256", "sha3", "base64"]

[dependencies]
console_error_panic_hook = "0.1"
hex = "0.4.3"
iri-string = "0.7.12"
js-sys = "0.3.59"
# Pinned to the TC-112 capability-registry rev (tinycloud-node#98). This rev is
# the source of truth for the vendored packages/bootstrap/src/generated/
# capabilities.ts; the capabilities-sync CI job diffs against this same rev. The
# WASM SDK crates are unchanged from v1.4.2 (v1.4.2 is an ancestor; none of the
# intervening commits touch tinycloud-sdk-rs/tinycloud-sdk-wasm).
tinycloud-sdk-rs = { git = "https://github.com/tinycloudlabs/tinycloud-node.git", rev = "c9d031b96eea2b87a7cd79a969870dbc72e45533" }
tinycloud-sdk-wasm = { git = "https://github.com/tinycloudlabs/tinycloud-node.git", rev = "c9d031b96eea2b87a7cd79a969870dbc72e45533" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.150"
serde-wasm-bindgen = "0.6.5"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4.70"

# Random number generation (features enabled per-target)
getrandom = "0.2"

# Browser-only (optional)
web-sys = { version = "0.3.59", features = ["console"], optional = true }

# Node.js - Ethereum signing (optional)
k256 = { version = "0.13", features = ["ecdsa", "std"], optional = true }
sha3 = { version = "0.10", optional = true }
base64 = { version = "0.21", optional = true }
rsa = "0.9.10"

[dev-dependencies]
tokio = { version = "1.52", features = ["full"] }
rsa = "0.9.10"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]
