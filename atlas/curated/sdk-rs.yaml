# atlas/curated/sdk-rs.yaml
#
# Hand-curated overlay for @tinycloud/sdk-rs.
# Structural facts (modules, loc, hash) are regenerated by
# `bun run atlas:rebuild`. The fields below override or extend them.
# When source moves and the overlay no longer matches, it shows up in
# /atlas/data/drift.json — fix it here, not in the JSON.

id: "sdk-rs"
npm: "@tinycloud/sdk-rs"
kind: "rust"     # rust = rust kernel
side: "iso"     # isomorphic — runs anywhere

# The one paragraph the atlas promises to keep current.
# Voice: editorial, present tense, ≤ 4 sentences. Explain WHY, not WHAT.
why: |
  Rust crate. Owns Ed25519 session keys, SIWE+ReCap message building, UCAN delegation chain creation. Re-exports a subset of tinycloud-node's protocol crate. Compiled to two WASM targets.

# Boundaries: every package this one talks across.
# Auto-discovery finds the edges; this adds the *intent* of each edge.
boundaries:
  - id: "tinycloud-node (git)"
    note: ""   # TODO: why this edge exists

# Notable exports to call out in chapter prose. The full list is parsed
# from src/index.ts at rebuild time — this is for highlighting.
notable_exports:
  - "TCWSessionManager"
  - "prepareSession"
  - "completeSessionSetup"
  - "createDelegation"
  - "useDelegation"
  - "invoke"

# This package surfaces 0 commands. List the notable ones here when porting chapter 04.
notable_commands: []

# Diagrams this package drives — toggles linked-from/to in the chapter pages.
hasFsm: false
hasSeq: false
